version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: nexus-postgres
    restart: always
    environment:
      POSTGRES_DB: nexus_inventory
      POSTGRES_USER: mohammedanasbaseer
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: